<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Danh Sách Đồng Bộ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        #login-screen, #image-zoom-overlay, #confirm-modal { backdrop-filter: blur(10px); }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen p-4 md:p-8 text-center">

    <!-- Màn hình Đăng nhập -->
    <div id="login-screen" class="fixed inset-0 z-[100] bg-slate-900/80 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md p-8 rounded-[2.5rem] shadow-2xl animate-in zoom-in-95 duration-300">
            <div class="w-16 h-16 bg-indigo-100 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i data-lucide="cloud-lightning" class="w-8 h-8 text-indigo-600"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tighter mb-1">Hệ thống đồng bộ</h2>
            <p class="text-slate-400 text-[10px] font-bold mb-8 uppercase tracking-widest">Đăng nhập để làm việc cùng đồng đội</p>
            
            <div class="space-y-4 text-left">
                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-500 mb-1 ml-1">Tài khoản</label>
                    <input id="login-user" type="text" class="w-full px-5 py-3 border-2 border-slate-200 rounded-xl font-semibold focus:border-indigo-500 outline-none" placeholder="wkd">
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-500 mb-1 ml-1">Mật khẩu</label>
                    <input id="login-pass" type="password" class="w-full px-5 py-3 border-2 border-slate-200 rounded-xl font-semibold focus:border-indigo-500 outline-none" placeholder="abc123">
                </div>
                <div class="flex items-center gap-2 ml-1">
                    <input type="checkbox" id="remember-me" class="w-4 h-4 rounded border-slate-300 text-indigo-600">
                    <label for="remember-me" class="text-xs font-bold text-slate-600 cursor-pointer uppercase">Ghi nhớ tôi</label>
                </div>
                <div id="login-error" class="hidden text-red-500 text-xs font-bold text-center italic">* Thông tin không chính xác</div>
                <button onclick="checkLogin()" class="w-full py-4 bg-indigo-600 text-white font-black uppercase tracking-widest text-xs rounded-2xl shadow-xl active:scale-95 transition-all">Đăng nhập</button>
            </div>
        </div>
    </div>

    <!-- Ứng dụng chính -->
    <div class="max-w-6xl mx-auto opacity-0 pointer-events-none transition-opacity duration-500" id="app">
        <header class="flex justify-between items-center mb-6 bg-white p-6 rounded-2xl shadow-md border border-slate-200 sticky top-4 z-40">
            <div class="text-left">
                <h1 class="text-2xl md:text-3xl font-black text-indigo-600 uppercase tracking-tighter">Danh Sách</h1>
                <div class="flex items-center gap-3">
                    <p class="text-slate-500 text-[10px] font-bold uppercase" id="total-count">Đang kết nối...</p>
                    <button onclick="logout()" class="text-slate-300 hover:text-red-500 text-[10px] font-black uppercase underline decoration-2 underline-offset-4">Thoát</button>
                </div>
            </div>
            <button onclick="toggleForm()" class="flex items-center gap-2 px-6 py-2.5 bg-indigo-600 text-white rounded-xl font-black uppercase text-xs shadow-lg active:scale-95 transition-all">
                <i data-lucide="plus" class="w-4 h-4"></i> Thêm mới
            </button>
        </header>

        <div id="list-container" class="space-y-4 mb-32">
            <div class="flex justify-center p-20"><div class="loading-spinner"></div></div>
        </div>

        <!-- Form nhập liệu -->
        <div id="form-overlay" class="hidden fixed inset-0 bg-slate-900/50 z-50 flex items-end md:items-center justify-center p-4">
            <div class="bg-white w-full max-w-4xl p-8 rounded-t-[2.5rem] md:rounded-[2.5rem] shadow-2xl">
                <div class="flex justify-between items-center mb-6 border-b pb-4">
                    <h2 class="text-xl font-black text-slate-800 uppercase">Thêm Máy Mới</h2>
                    <button onclick="toggleForm()" class="text-slate-400 hover:text-red-500"><i data-lucide="x"></i></button>
                </div>
                <form id="main-form" onsubmit="handleFormSubmit(event)" class="grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-black uppercase text-slate-500 mb-1 ml-1">Khách hàng *</label>
                            <input required id="f-customer" type="text" class="w-full px-5 py-3 border-2 border-slate-200 rounded-xl font-semibold outline-none focus:border-indigo-500">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-black uppercase text-slate-500 mb-1 ml-1">Máy móc *</label>
                                <input required id="f-machine" type="text" class="w-full px-5 py-3 border-2 border-slate-200 rounded-xl font-semibold outline-none focus:border-indigo-500">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black uppercase text-slate-500 mb-1 ml-1">Ngày nhập</label>
                                <input id="f-date" type="text" class="w-full px-5 py-3 border-2 border-slate-200 rounded-xl font-semibold bg-slate-50" readonly>
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black uppercase text-slate-500 mb-1 ml-1">Số lần đi</label>
                            <div class="flex gap-2 p-1 bg-slate-100 rounded-xl" id="visit-selector">
                                <button type="button" onclick="setVisit(1)" class="v-btn flex-1 py-2 rounded-lg font-bold text-xs bg-indigo-600 text-white" data-val="1">1</button>
                                <button type="button" onclick="setVisit(2)" class="v-btn flex-1 py-2 rounded-lg font-bold text-xs bg-white text-slate-500" data-val="2">2</button>
                                <button type="button" onclick="setVisit(3)" class="v-btn flex-1 py-2 rounded-lg font-bold text-xs bg-white text-slate-500" data-val="3">3</button>
                                <button type="button" onclick="setVisit(4)" class="v-btn flex-1 py-2 rounded-lg font-bold text-xs bg-white text-slate-500" data-val="4">4</button>
                                <button type="button" onclick="setVisit(5)" class="v-btn flex-1 py-2 rounded-lg font-bold text-xs bg-white text-slate-500" data-val="5">5</button>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <textarea id="f-issue" class="w-full px-5 py-3 border-2 border-slate-200 rounded-xl font-semibold h-24 outline-none focus:border-indigo-500" placeholder="Lỗi ban đầu..."></textarea>
                        <textarea id="f-checked" class="w-full px-5 py-3 border-2 border-slate-300 rounded-xl font-semibold h-24 bg-indigo-50/20 outline-none focus:border-indigo-500" placeholder="Nội dung kiểm tra..."></textarea>
                        <div class="flex items-center gap-4">
                            <label class="flex-1 border-2 border-dashed border-slate-200 p-3 rounded-xl flex items-center justify-center gap-2 cursor-pointer">
                                <i data-lucide="image" class="w-4 h-4 text-slate-400"></i>
                                <span class="text-[10px] font-black uppercase text-slate-400">Ảnh máy</span>
                                <input type="file" id="f-img-input" accept="image/*" class="hidden" onchange="handleImgPreview(event)">
                            </label>
                            <div id="img-preview-box" class="hidden relative w-16 h-16 rounded-xl border overflow-hidden shadow-md">
                                <img id="img-preview" src="" class="w-full h-full object-cover">
                                <button type="button" onclick="clearImg()" class="absolute top-0 right-0 bg-red-500 text-white p-0.5"><i data-lucide="x" class="w-3 h-3"></i></button>
                            </div>
                        </div>
                        <button type="submit" id="btn-save" class="w-full py-4 bg-indigo-600 text-white font-black uppercase tracking-widest text-xs rounded-2xl shadow-xl active:scale-95 transition-all">Đang xử lý...</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Chỉnh sửa nhanh -->
        <div id="edit-overlay" class="hidden fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4">
            <div class="bg-white w-full max-w-2xl p-6 rounded-[2rem] shadow-2xl">
                <h3 class="font-black uppercase text-slate-800 mb-4 border-b pb-2 text-left">Chỉnh sửa thông tin</h3>
                <div class="space-y-4 text-left">
                    <input type="hidden" id="edit-id">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input id="edit-customer" class="w-full p-3 border-2 border-slate-200 rounded-xl font-semibold outline-none focus:border-indigo-500" placeholder="Khách hàng">
                        <input id="edit-machine" class="w-full p-3 border-2 border-slate-200 rounded-xl font-semibold outline-none focus:border-indigo-500" placeholder="Máy móc">
                        <select id="edit-visit" class="w-full p-3 border-2 border-slate-200 rounded-xl font-semibold bg-white outline-none">
                            <option value="1">1 lần</option><option value="2">2 lần</option><option value="3">3 lần</option><option value="4">4 lần</option><option value="5">5 lần</option>
                        </select>
                    </div>
                    <textarea id="edit-content" class="w-full p-3 border-2 border-slate-200 rounded-xl font-semibold h-32 outline-none focus:border-indigo-500" placeholder="Nội dung kiểm tra..."></textarea>
                    <div class="flex justify-end gap-2 pt-2">
                        <button onclick="closeEdit()" class="px-6 py-2 bg-slate-100 rounded-xl font-black text-[10px] uppercase">Hủy</button>
                        <button onclick="saveEdit()" class="px-8 py-2 bg-indigo-600 text-white rounded-xl font-black text-[10px] shadow-lg uppercase">Cập nhật</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Ảnh phóng to -->
        <div id="image-zoom-overlay" class="hidden fixed inset-0 z-[110] bg-slate-900/90 flex items-center justify-center p-4 cursor-zoom-out" onclick="closeZoom()">
            <img id="zoomed-image" src="" class="max-w-full max-h-full rounded-2xl shadow-2xl animate-in zoom-in-90 duration-300 pointer-events-none">
        </div>

        <!-- Modal xác nhận xóa -->
        <div id="confirm-modal" class="hidden fixed inset-0 z-[120] bg-slate-900/60 flex items-center justify-center p-4">
            <div class="bg-white p-8 rounded-[2.5rem] max-w-xs w-full shadow-2xl">
                <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="trash-2" size="32"></i></div>
                <h4 class="font-black text-slate-800 uppercase text-lg mb-2">Xóa dữ liệu?</h4>
                <p class="text-slate-500 text-sm mb-6">Hành động này sẽ xóa vĩnh viễn dữ liệu trên hệ thống đám mây.</p>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="closeDelete()" class="py-3 bg-slate-100 text-slate-600 font-bold rounded-2xl text-xs uppercase">Hủy</button>
                    <button id="btn-delete-confirm" class="py-3 bg-red-500 text-white font-bold rounded-2xl text-xs uppercase shadow-lg shadow-red-100">Xóa</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config từ môi trường
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let items = [];
        let currentVisit = 1;
        let currentImgBase64 = null;
        let unsubscribe = null;
        let deleteId = null;

        // --- AUTHENTICATION ---
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth error:", err);
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Khi đã có user, bắt đầu lắng nghe dữ liệu đám mây
                setupRealtimeListener(user.uid);
                document.getElementById('btn-save').innerText = "Lưu danh sách";
            }
        });

        function setupRealtimeListener(uid) {
            // Đường dẫn public để nhiều người cùng thấy
            const dataPath = collection(db, 'artifacts', appId, 'public', 'data', 'machines');
            
            if (unsubscribe) unsubscribe();
            
            unsubscribe = onSnapshot(dataPath, (snapshot) => {
                items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                // Sắp xếp theo thời gian cập nhật mới nhất trước
                items.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                render();
            }, (error) => {
                console.error("Snapshot error:", error);
            });
        }

        // --- GIAO DIỆN & LOGIC ---
        window.checkLogin = () => {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const remember = document.getElementById('remember-me').checked;

            if (user === 'wkd' && pass === 'abc123') {
                if (remember) localStorage.setItem('isLoggedIn', 'true');
                else sessionStorage.setItem('isLoggedIn', 'true');
                showApp();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        };

        window.logout = () => {
            localStorage.removeItem('isLoggedIn');
            sessionStorage.removeItem('isLoggedIn');
            location.reload();
        };

        function showApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('opacity-0', 'pointer-events-none');
            initAuth();
        }

        if (localStorage.getItem('isLoggedIn') === 'true' || sessionStorage.getItem('isLoggedIn') === 'true') {
            showApp();
        }

        window.toggleForm = () => {
            document.getElementById('form-overlay').classList.toggle('hidden');
            document.getElementById('f-date').value = new Date().toLocaleDateString('vi-VN');
        };

        window.setVisit = (val) => {
            currentVisit = val;
            document.querySelectorAll('.v-btn').forEach(btn => {
                const bVal = parseInt(btn.getAttribute('data-val'));
                if (bVal === val) {
                    btn.className = "v-btn flex-1 py-2 rounded-lg font-bold text-xs bg-indigo-600 text-white shadow-sm";
                } else {
                    btn.className = "v-btn flex-1 py-2 rounded-lg font-bold text-xs bg-white text-slate-500";
                }
            });
        };

        window.handleImgPreview = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onloadend = () => {
                    currentImgBase64 = reader.result;
                    document.getElementById('img-preview').src = reader.result;
                    document.getElementById('img-preview-box').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        window.clearImg = () => {
            currentImgBase64 = null;
            document.getElementById('img-preview-box').classList.add('hidden');
            document.getElementById('f-img-input').value = "";
        };

        window.handleFormSubmit = async (e) => {
            e.preventDefault();
            if (!auth.currentUser) return;

            const newItem = {
                customer: document.getElementById('f-customer').value,
                machine: document.getElementById('f-machine').value,
                entryDate: document.getElementById('f-date').value,
                visitCount: currentVisit,
                issue: document.getElementById('f-issue').value,
                checkedContent: document.getElementById('f-checked').value,
                image: currentImgBase64,
                checked: false,
                updatedAt: new Date().toLocaleString('vi-VN'),
                timestamp: Date.now()
            };

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'machines'), newItem);
                document.getElementById('main-form').reset();
                clearImg();
                setVisit(1);
                toggleForm();
            } catch (err) {
                console.error("Add error:", err);
            }
        };

        window.openDelete = (id) => {
            deleteId = id;
            document.getElementById('confirm-modal').classList.remove('hidden');
        };

        window.closeDelete = () => {
            document.getElementById('confirm-modal').classList.add('hidden');
            deleteId = null;
        };

        document.getElementById('btn-delete-confirm').onclick = async () => {
            if (!deleteId || !auth.currentUser) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'machines', deleteId));
                closeDelete();
            } catch (err) {
                console.error("Delete error:", err);
            }
        };

        window.toggleStatus = async (id, currentStatus) => {
            if (!auth.currentUser) return;
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'machines', id), {
                    checked: !currentStatus,
                    updatedAt: new Date().toLocaleString('vi-VN'),
                    timestamp: Date.now()
                });
            } catch (err) {
                console.error("Update error:", err);
            }
        };

        window.openEdit = (id) => {
            const item = items.find(i => i.id === id);
            if (!item) return;
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-customer').value = item.customer;
            document.getElementById('edit-machine').value = item.machine;
            document.getElementById('edit-visit').value = item.visitCount;
            document.getElementById('edit-content').value = item.checkedContent;
            document.getElementById('edit-overlay').classList.remove('hidden');
        };

        window.closeEdit = () => {
            document.getElementById('edit-overlay').classList.add('hidden');
        };

        window.saveEdit = async () => {
            const id = document.getElementById('edit-id').value;
            if (!id || !auth.currentUser) return;
            
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'machines', id), {
                    customer: document.getElementById('edit-customer').value,
                    machine: document.getElementById('edit-machine').value,
                    visitCount: parseInt(document.getElementById('edit-visit').value),
                    checkedContent: document.getElementById('edit-content').value,
                    updatedAt: new Date().toLocaleString('vi-VN'),
                    timestamp: Date.now()
                });
                closeEdit();
            } catch (err) {
                console.error("Save edit error:", err);
            }
        };

        window.openZoom = (src) => {
            document.getElementById('zoomed-image').src = src;
            document.getElementById('image-zoom-overlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        };

        window.closeZoom = () => {
            document.getElementById('image-zoom-overlay').classList.add('hidden');
            document.body.style.overflow = '';
        };

        function render() {
            const container = document.getElementById('list-container');
            const countLabel = document.getElementById('total-count');
            countLabel.innerText = `Đang đồng bộ: ${items.length} mục`;
            
            container.innerHTML = '';
            
            if (items.length === 0) {
                container.innerHTML = `<div class="bg-white p-16 rounded-3xl border-2 border-dashed border-slate-200 text-slate-300 font-bold uppercase text-[10px] tracking-widest">Danh sách trống</div>`;
                return;
            }

            items.forEach((item, index) => {
                const card = document.createElement('div');
                let bgColorClass = index % 2 === 0 ? 'bg-white border-white' : 'bg-slate-50/80 border-slate-50/80';
                if (item.checked) bgColorClass = 'bg-emerald-50/40 border-emerald-200';

                card.className = `${bgColorClass} p-5 rounded-3xl shadow-sm border-2 transition-all flex flex-col md:flex-row gap-4 items-start md:items-center animate-in fade-in duration-500`;
                
                const lines = item.checkedContent ? item.checkedContent.split('\n').filter(l => l.trim() !== '') : [];
                const contentHtml = lines.length > 1 
                    ? `<ul class="space-y-1 mt-1">${lines.map(l => `<li class="flex gap-2 items-start text-left"><span class="w-1.5 h-1.5 bg-indigo-400 rounded-full mt-1.5 flex-shrink-0"></span><span class="text-sm font-medium text-slate-700">${l}</span></li>`).join('')}</ul>`
                    : `<p class="text-sm font-medium text-slate-700 text-left">${item.checkedContent || '---'}</p>`;

                card.innerHTML = `
                    <div class="flex-shrink-0 w-10 h-10 bg-slate-200/50 rounded-full flex items-center justify-center font-black text-slate-500 text-[10px]">#${index + 1}</div>
                    <div class="flex-1 text-left w-full">
                        <div class="flex items-center gap-2 flex-wrap mb-1">
                            <h3 class="font-black uppercase text-lg text-slate-800 leading-none tracking-tight">${item.customer}</h3>
                            <span class="bg-amber-100 text-amber-700 text-[9px] font-black px-2 py-0.5 rounded-lg border border-amber-200">LẦN ${item.visitCount}</span>
                            <span class="text-slate-400 text-[9px] font-bold italic uppercase">Cập nhật: ${item.updatedAt}</span>
                        </div>
                        <p class="text-indigo-600 font-bold text-xs mb-3 flex items-center gap-1 uppercase tracking-tighter"><i data-lucide="monitor" class="w-3 h-3"></i> ${item.machine} | ${item.entryDate}</p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="bg-slate-200/20 p-3 rounded-2xl border border-slate-100 shadow-sm">
                                <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Lỗi ban đầu:</p>
                                <p class="text-sm text-slate-600 leading-snug">${item.issue || '---'}</p>
                            </div>
                            <div class="bg-indigo-50/30 p-3 rounded-2xl border border-indigo-100 cursor-pointer hover:bg-indigo-50 shadow-sm transition-colors" onclick="openEdit('${item.id}')">
                                <p class="text-[9px] font-black text-indigo-500 uppercase mb-1 flex items-center gap-1">Đã kiểm tra <i data-lucide="edit-3" class="w-2.5 h-2.5"></i></p>
                                ${contentHtml}
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 w-full md:w-auto justify-between border-t md:border-t-0 pt-3 md:pt-0">
                        <div class="relative">
                            ${item.image ? `<img src="${item.image}" onclick="openZoom('${item.image}')" class="w-12 h-12 rounded-xl object-cover border-4 border-white shadow-md cursor-zoom-in hover:scale-105 transition-transform">` : '<div class="w-12 h-12 bg-slate-100 border-2 border-dashed border-slate-200 rounded-xl flex items-center justify-center text-slate-300"><i data-lucide="image" class="w-5 h-5"></i></div>'}
                        </div>
                        <div class="flex gap-1">
                            <button onclick="toggleStatus('${item.id}', ${item.checked})" class="p-2.5 rounded-xl transition-all ${item.checked ? 'bg-emerald-500 text-white shadow-emerald-200' : 'bg-slate-100 text-slate-400'} shadow-sm active:scale-90"><i data-lucide="check-circle"></i></button>
                            <button onclick="openEdit('${item.id}')" class="p-2.5 bg-slate-100 text-slate-400 rounded-xl hover:text-indigo-600 shadow-sm active:scale-90"><i data-lucide="edit-2"></i></button>
                            <button onclick="openDelete('${item.id}')" class="p-2.5 bg-red-50 text-red-400 rounded-xl hover:bg-red-100 shadow-sm active:scale-90"><i data-lucide="trash-2"></i></button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        // Khởi tạo các biểu tượng Lucide
        lucide.createIcons();
    </script>
</body>
</html>
